name: Test @accesslint/core

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - run: bun install

      - name: Run unit tests with coverage
        run: bun run test:coverage
        working-directory: core

  browser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - run: bun install

      - name: Install Chromium for Playwright
        run: npx playwright install chromium --with-deps
        working-directory: core

      - name: Run ACT conformance gate
        run: npx turbo run act --filter=@accesslint/core

      - name: Upload EARL report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: earl-report-browser
          path: core/act-fixtures/earl-report-browser.json

  deploy-earl:
    needs: browser
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: gh-pages

      - uses: actions/download-artifact@v4
        with:
          name: earl-report-browser

      - name: Commit and push EARL report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add earl-report-browser.json
          git diff --cached --quiet && exit 0
          git commit -m "Update EARL report from ${GITHUB_SHA:0:7}"
          git push
