name: Test @accesslint/core

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2

      - run: bun install

      - name: Run unit tests with coverage
        # Drive through turbo so the build dep runs first; bundle.test.ts
        # now fails fast when core/dist/ is missing.
        run: npx turbo run test:coverage --filter=@accesslint/core

  browser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2

      - run: bun install

      - name: Install Chromium for Playwright
        run: npx playwright install chromium --with-deps
        working-directory: core

      - name: Run ACT conformance gate
        run: npx turbo run act --filter=@accesslint/core

      - name: Upload EARL report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: earl-report-browser
          path: core/act-fixtures/earl-report-browser.json
