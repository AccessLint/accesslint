name: Test @accesslint/core

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - run: bun install

      - name: Run unit tests with coverage
        run: bun run test:coverage
        working-directory: core

  browser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - run: bun install

      - run: npx playwright install chromium --with-deps

      - name: Cache turbo artifacts
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-act-${{ runner.os }}-${{ github.sha }}
          restore-keys: turbo-act-${{ runner.os }}-

      - name: Run ACT conformance gate
        run: npx turbo run act:check --filter=@accesslint/core

      - name: Upload EARL report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: earl-report-browser
          path: core/act-fixtures/earl-report-browser.json
