name: Publish @accesslint/core

on:
  push:
    tags: ["core/v*"]

env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - run: bun install

      - run: bun run test
        working-directory: core

      - run: npx turbo run build --filter=@accesslint/core

      - run: npm publish --provenance --access public
        working-directory: core

      - name: Create GitHub release
        run: gh release create "$GITHUB_REF_NAME" --generate-notes --title "@accesslint/core v${GITHUB_REF_NAME#core/v}"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Install Chromium for Playwright
        run: npx playwright install chromium --with-deps
        working-directory: core

      - name: Run ACT conformance gate
        run: npx turbo run act --filter=@accesslint/core

      - name: Upload EARL report
        uses: actions/upload-artifact@v4
        with:
          name: earl-report-browser
          path: core/act-fixtures/earl-report-browser.json

      - name: Notify a11y-agent
        if: ${{ env.A11Y_AGENT_DISPATCH_TOKEN != '' }}
        run: |
          gh api repos/AccessLint/a11y-agent/dispatches \
            -f event_type=core-published \
            -f 'client_payload[version]'="${GITHUB_REF_NAME#core/v}"
        env:
          GH_TOKEN: ${{ secrets.A11Y_AGENT_DISPATCH_TOKEN }}
          A11Y_AGENT_DISPATCH_TOKEN: ${{ secrets.A11Y_AGENT_DISPATCH_TOKEN }}

      - name: Notify accesslint-bench
        if: ${{ env.BENCH_DISPATCH_TOKEN != '' }}
        run: |
          gh api repos/AccessLint/accesslint-bench/dispatches \
            -f event_type=core-published \
            -f 'client_payload[version]'="${GITHUB_REF_NAME#core/v}"
        env:
          GH_TOKEN: ${{ secrets.BENCH_DISPATCH_TOKEN }}
          BENCH_DISPATCH_TOKEN: ${{ secrets.BENCH_DISPATCH_TOKEN }}

  deploy-earl:
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          ref: gh-pages

      - uses: actions/download-artifact@v4
        with:
          name: earl-report-browser

      - name: Commit and push EARL report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add earl-report-browser.json
          git diff --cached --quiet && exit 0
          git commit -m "Update EARL report for ${GITHUB_REF_NAME}"
          git push
