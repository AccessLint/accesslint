name: Publish @accesslint/jest

on:
  push:
    tags: ["jest/v*"]

env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - run: bun install

      - run: npx turbo run build --filter=...@accesslint/jest

      - name: Replace workspace:* with published versions
        working-directory: jest
        run: |
          node -e "
          const fs = require('fs'), path = require('path');
          const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          for (const sec of ['dependencies', 'devDependencies', 'peerDependencies']) {
            for (const [name, ver] of Object.entries(pkg[sec] ?? {})) {
              if (ver === 'workspace:*') {
                const dir = name.split('/')[1];
                const dep = JSON.parse(fs.readFileSync(path.join('..', dir, 'package.json'), 'utf8'));
                pkg[sec][name] = dep.version;
              }
            }
          }
          fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - run: npm publish --provenance --access public
        working-directory: jest

      - name: Create GitHub release
        run: gh release create "$GITHUB_REF_NAME" --generate-notes --title "@accesslint/jest v${GITHUB_REF_NAME#jest/v}"
        env:
          GH_TOKEN: ${{ github.token }}
